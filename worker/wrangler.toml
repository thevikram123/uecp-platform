name = "uecp-gemini-proxy"
main = "src/worker.js"
compatibility_date = "2026-07-01"

[vars]
ALLOWED_ORIGINS = "https://thevikram123.github.io"
LIVE_MODEL = "gemini-3.5-live-translate-preview"
TEXT_MODEL = "gemini-3.1-flash-lite"

# GEMINI_API_KEY must be configured as a secret:
# npx wrangler secret put GEMINI_API_KEY
#
# GitHub Pages origin is restricted above; add any other production origin explicitly.
