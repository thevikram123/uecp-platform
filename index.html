<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffe600">
  <meta name="description" content="Unified Emergency Communication Platform for coordinated multi-agency response.">
  <title>UECP | Tamil Nadu Emergency Communications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260721d">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32"><path d="M16 3 27 8v8c0 7-4.7 11.7-11 14C9.7 27.7 5 23 5 16V8l11-5Z"/><path d="M10 17h3l2-5 3 9 2-4h3"/></svg>
        </span>
        <span><strong>UECP</strong><small>Unified Emergency Comms</small></span>
      </div>

      <nav class="nav" aria-label="Primary navigation">
        <p class="nav-label">Command</p>
        <button class="nav-item active" data-view="overview"><span data-icon="grid"></span><span>Operational overview</span></button>
        <button class="nav-item" data-view="directory"><span data-icon="users"></span><span>Jurisdiction directory</span></button>
        <button class="nav-item" data-view="incidents"><span data-icon="alert"></span><span>Incident command</span><b class="count-badge">3</b></button>
        <button class="nav-item" data-view="comms"><span data-icon="radio"></span><span>Unified comms</span></button>
        <p class="nav-label">Intelligence</p>
        <button class="nav-item" data-view="translate"><span data-icon="languages"></span><span>Live translation</span><i class="live-dot"></i></button>
        <button class="nav-item" data-view="integrations"><span data-icon="network"></span><span>Integrations</span></button>
        <button class="nav-item" data-view="audit"><span data-icon="shield"></span><span>Evidence & audit</span></button>
      </nav>

      <div class="sidebar-status">
        <div class="status-head"><span class="status-pulse"></span><strong>State core operational</strong></div>
        <p>DC ↔ DRC synchronized</p>
        <div class="sync-bar"><span></span></div>
        <small>Last sync 14 seconds ago</small>
      </div>
      <div class="profile">
        <div class="avatar">AK</div>
        <div><strong>A. Karthik</strong><small>ADGP · State Control Room</small></div>
        <button class="icon-button" aria-label="Open account menu" data-icon="chevron-down"></button>
      </div>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <button class="menu-button icon-button" id="menuButton" aria-label="Toggle navigation" data-icon="menu"></button>
        <div class="page-title"><p id="eyebrow">COMMAND CENTRE</p><h1 id="pageTitle">Operational overview</h1></div>
        <label class="global-search"><span data-icon="search"></span><input id="globalSearch" type="search" placeholder="Search people, incidents, units or channels" aria-label="Global search"><kbd>⌘ K</kbd></label>
        <div class="top-actions">
          <span class="classification">OFFICIAL</span>
          <button class="icon-button notification-button" aria-label="Notifications" data-icon="bell"><i></i></button>
          <span class="clock" id="clock">--:-- IST</span>
        </div>
      </header>

      <main id="viewRoot" tabindex="-1"></main>
    </div>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="detail-drawer" id="detailDrawer" aria-hidden="true"></aside>

  <dialog id="incidentDialog" class="modal">
    <form method="dialog" id="incidentForm">
      <div class="modal-head"><div><p class="eyebrow">NEW COMMAND GROUP</p><h2>Create incident</h2></div><button value="cancel" class="icon-button" aria-label="Close" data-icon="x"></button></div>
      <label>Incident title<input name="title" required placeholder="e.g. Flooding near Saidapet bridge"></label>
      <div class="form-grid">
        <label>Severity<select name="severity"><option>Critical</option><option selected>High</option><option>Medium</option></select></label>
        <label>Source<select name="source"><option>ERSS 112</option><option>ICCC</option><option selected>Manual</option><option>Fire CAD</option></select></label>
      </div>
      <label>Location<input name="location" required placeholder="Area, landmark or coordinates"></label>
      <label>Responding agencies<div class="check-grid"><span><input type="checkbox" checked> Police</span><span><input type="checkbox" checked> Fire & Rescue</span><span><input type="checkbox" checked> EMRI 108</span><span><input type="checkbox"> Revenue</span></div></label>
      <div class="modal-actions"><button value="cancel" class="button secondary">Cancel</button><button value="default" class="button primary" id="createIncidentSubmit"><span data-icon="plus"></span>Create & notify</button></div>
    </form>
  </dialog>

  <div class="toast-region" id="toastRegion" aria-live="polite"></div>
  <input id="fileInput" type="file" hidden multiple>
  <script type="module" src="app.js?v=20260721e"></script>
</body>
</html>
